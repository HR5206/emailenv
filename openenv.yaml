spec_version: "1.0"
name: HelpdeskEnv
id: helpdeskenv
type: space
version: "2.0.0"
description: "A multi-agent OpenEnv environment simulating an IT helpdesk with triage, tiered support, SLA tracking, and self-improving Knowledge Base."
license: Apache-2.0
homepage: "https://huggingface.co/spaces/Harishraghav-05/helpdeskenv"
repository: "https://github.com/HR5206/emailenv"
maintainers:
  - name: "HelpdeskEnv Maintainers"
    email: "harishraghav256@gmail.com"
runtime:
  type: docker
  dockerfile: Dockerfile
  port: 7860
tags:
  - openenv
  - multi-agent
  - helpdesk
  - self-improving
  - knowledge-base
  - IT-support
tasks:
  - id: ticket_triage
    name: Ticket Triage
    description: "Classify incoming ticket: category, priority, and support tier."
    difficulty: easy
    grader:
      type: python
      path: graders.py
      function: grade_triage
  - id: ticket_resolution
    name: Ticket Resolution
    description: "Resolve IT support tickets through diagnosis and solution application."
    difficulty: medium
    grader:
      type: python
      path: graders.py
      function: grade_reply
  - id: kb_contribution
    name: Knowledge Base Contribution
    description: "Document novel solutions for future retrieval — self-improvement mechanism."
    difficulty: hard
    grader:
      type: python
      path: graders.py
      function: grade_kb_contribution
