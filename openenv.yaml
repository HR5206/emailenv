spec_version: 1
name: EmailEnv
id: emailenv
type: space
version: "0.1.0"
description: "An OpenEnv-compliant environment for professional email triage and customer support, including spam detection, prioritization, and reply generation."
license: Apache-2.0
homepage: "https://huggingface.co/spaces/Harishraghav-05/emailenv"
repository: "https://github.com/HR5206/emailenv"
maintainers:
  - name: "EmailEnv Maintainers"
    email: "harishraghav256@gmail.com"
runtime:
  type: docker
  dockerfile: Dockerfile
  port: 7860
tags:
  - openenv
  - email
  - spam-detection
  - customer-support
  - prioritization
  - reply-generation
metadata:
  tasks:
    - id: emailenv-spam-classification
      name: Spam classification
      difficulty: easy
    - id: emailenv-email-prioritization
      name: Email prioritization
      difficulty: medium
    - id: emailenv-reply-generation
      name: Reply generation
      difficulty: hard
